spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:hospital;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    druid:
      validation-query: SELECT 1
  sql:
    init:
      mode: always
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
payment:
  callback-secret: test-payment-secret
cors:
  allowed-origins: http://localhost:3000
auth:
  captcha-bypass:
    enabled: true
    code: 8888
    phones: ""
