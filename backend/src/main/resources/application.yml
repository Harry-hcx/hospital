server:
  port: 8080
spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    druid:
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
aliyun:
  sms:
    endpoint: ${ALIYUN_SMS_ENDPOINT:dypnsapi.aliyuncs.com}
auth:
  captcha-bypass:
    enabled: false
    code: ""
    phones: ""
payment:
  callback-secret: ${PAYMENT_CALLBACK_SECRET:}
alipay:
  server-base-url: ${ALIPAY_SERVER_BASE_URL:http://localhost:8080}
  frontend-base-url: ${ALIPAY_FRONTEND_BASE_URL:http://localhost:3000}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
