version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hospital-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: hospital_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/hospital_create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: hospital-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hospital_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospital-nginx
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
